<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राजश्री एडमिन - डिवाइस चेक</title>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // यदि डिवाइस मोबाइल है या स्क्रीन छोटी है (768px से कम)
            if (isMobile || window.innerWidth <= 768) {
                window.location.replace("mobile/index.html");
            } else {
                // कंप्यूटर के लिए
                window.location.replace("desktop/index.html");
            }
        });
    </script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f4f7f6; 
            color: #666; 
            margin: 0;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .spinner {
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(255, 20, 147, 0.2); 
            border-top-color: #FF1493; 
            border-radius: 50%;
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>सही वर्शन (Mobile/Desktop) लोड किया जा रहा है...</p>
    </div>
</body>
</html>
