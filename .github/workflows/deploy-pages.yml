name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # We skip the setup-pages step because we don't have a build framework like Jekyll or Hugo. 
      # We just want to serve the raw static files inside frontend/.
      
      - name: Prepare Deployment Payload
        run: |
          mkdir -p deploy_payload
          # Copy redirector and configuration files from root
          cp index.html deploy_payload/
          cp robots.txt deploy_payload/ 2>/dev/null || true
          cp sitemap.xml deploy_payload/ 2>/dev/null || true
          
          # Copy actual application folders
          cp -r frontend/desktop deploy_payload/
          cp -r frontend/mobile deploy_payload/
          cp -r frontend/shared deploy_payload/
          cp -r frontend/assets deploy_payload/
          
          # Fix redirects in index.html for deployment root
          # (Remove 'frontend/' prefix as it's the root of the deployment)
          sed -i 's|frontend/desktop/|desktop/|g' deploy_payload/index.html
          sed -i 's|frontend/mobile/|mobile/|g' deploy_payload/index.html
          
          # The result: A perfectly clean deployment folder where index.html is at the root, 
          # CSS/JS are in src/, and everything links perfectly!

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tell GitHub Pages to strictly serve the prepared payload directory
          path: 'deploy_payload'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
