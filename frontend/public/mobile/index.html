<!DOCTYPE html>
<html lang="hi">

<head>

    <link rel="stylesheet" href="../../src/css/mobile/main.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Hind:wght@400;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">

<body>

    <main id="master-mobile">

            <span class="nav-icon">➡️</span>

    <!-- Essential Global Variables (Simulating browser environment expected by logic) -->
    <script>
        window.AUDIO_BASE_PATH = '../../assets/audio/';
        window.RAJSHREE_DATA = {}; // Will be populated by individual data scripts

    <script src="../../src/js/data/varnamala/vyanjan.js"></script>
    <script src="../../src/js/data/varnamala/samyukt.js"></script>

    <script src="../../src/js/mobile/main.js"></script>

        function openSettings() {
            window.location.href = 'settings.html';
        }
    </script>
